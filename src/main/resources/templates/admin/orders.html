<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('订单管理 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <h3><i class="bi bi-clipboard-check"></i> 订单管理</h3>
        <hr>

        <div class="table-responsive" th:if="${orders != null and !orders.isEmpty()}">
            <table class="table table-hover admin-table">
                <thead class="table-light">
                    <tr>
                        <th>订单编号</th>
                        <th>收货人</th>
                        <th>总金额</th>
                        <th>下单时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderNo}">ORD</td>
                        <td th:text="${order.receiverName}">姓名</td>
                        <td class="text-danger fw-bold" th:text="'¥' + ${order.totalAmount}">¥0.00</td>
                        <td th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <span class="badge status-badge"
                                  th:classappend="'status-' + ${order.status}"
                                  th:switch="${order.status}">
                                <span th:case="'PENDING_PAYMENT'">待付款</span>
                                <span th:case="'PAID'">已付款</span>
                                <span th:case="'SHIPPED'">已发货</span>
                                <span th:case="'COMPLETED'">已完成</span>
                                <span th:case="'CANCELLED'">已取消</span>
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/admin/order/detail/{no}(no=${order.orderNo})}"
                               class="btn btn-sm btn-outline-primary">查看详情</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
            <i class="bi bi-inbox" style="font-size: 5rem; color: #ccc;"></i>
            <h4 class="text-muted mt-3">暂无订单</h4>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
