<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('商品管理 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3><i class="bi bi-box-seam"></i> 商品管理</h3>
            <a th:href="@{/admin/product/add}" class="btn btn-success">
                <i class="bi bi-plus-lg"></i> 新增商品
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-hover admin-table">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>商品名称</th>
                        <th>价格</th>
                        <th>库存</th>
                        <th>状态</th>
                        <th>上架时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td th:text="${product.name}">名称</td>
                        <td class="text-danger" th:text="'¥' + ${product.price}">¥0.00</td>
                        <td th:text="${product.stock}">0</td>
                        <td>
                            <span class="badge" th:classappend="${product.status == 'ON_SALE'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${product.status == 'ON_SALE'} ? '在售' : '已下架'">状态</span>
                        </td>
                        <td th:text="${#temporals.format(product.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <a th:href="@{/admin/product/edit/{id}(id=${product.id})}"
                               class="btn btn-sm btn-outline-primary">编辑</a>
                            <form th:if="${product.status == 'ON_SALE'}"
                                  th:action="@{/admin/product/offshelf/{id}(id=${product.id})}"
                                  method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-warning"
                                        onclick="return confirm('确认下架该商品？')">下架</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <nav th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage - 1})}">上一页</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/products(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage + 1})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
