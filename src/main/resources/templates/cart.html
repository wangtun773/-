<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('购物车 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <h3><i class="bi bi-cart3"></i> 我的购物车</h3>
        <hr>

        <div th:if="${cartItems != null and !cartItems.isEmpty()}">
            <div class="table-responsive">
                <table class="table align-middle cart-table">
                    <thead class="table-light">
                        <tr>
                            <th>商品名称</th>
                            <th>单价</th>
                            <th style="width:160px;">数量</th>
                            <th>小计</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td th:text="${item.productName}">商品名称</td>
                            <td class="text-danger" th:text="'¥' + ${item.productPrice}">¥0.00</td>
                            <td>
                                <div class="input-group input-group-sm">
                                    <button class="btn btn-outline-secondary" type="button"
                                            th:attr="onclick=|updateQty(${item.id}, ${item.quantity - 1})|">-</button>
                                    <input type="number" class="form-control text-center qty-input"
                                           th:value="${item.quantity}" min="1" max="99"
                                           th:data-id="${item.id}" style="width:60px;">
                                    <button class="btn btn-outline-secondary" type="button"
                                            th:attr="onclick=|updateQty(${item.id}, ${item.quantity + 1})|">+</button>
                                </div>
                            </td>
                            <td class="text-danger fw-bold" th:text="'¥' + ${item.subtotal}">¥0.00</td>
                            <td>
                                <button class="btn btn-outline-danger btn-sm"
                                        th:attr="onclick=|removeItem(${item.id})|">
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card mt-3">
                <div class="card-body text-end">
                    <span class="fs-5">合计：</span>
                    <span class="text-danger fs-4 fw-bold" th:text="'¥' + ${totalAmount}">¥0.00</span>
                    <a th:href="@{/order/checkout}" class="btn btn-danger btn-lg ms-3">
                        <i class="bi bi-credit-card"></i> 去结算
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${cartItems == null or cartItems.isEmpty()}" class="text-center py-5">
            <i class="bi bi-cart" style="font-size: 5rem; color: #ccc;"></i>
            <h4 class="text-muted mt-3">购物车是空的</h4>
            <a th:href="@{/product/list}" class="btn btn-primary mt-2">去逛逛</a>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
    <script>
        function updateQty(cartItemId, newQty) {
            if (newQty === 0) {
                if (confirm('确认移除该商品？')) {
                    removeItem(cartItemId);
                }
                return;
            }
            fetch('/cart/update/' + cartItemId + '?quantity=' + newQty, { method: 'POST' })
            .then(function(r) { return r.text(); })
            .then(function(msg) {
                if (msg === 'SUCCESS') {
                    location.reload();
                } else if (msg === 'REMOVED') {
                    location.reload();
                } else {
                    alert(msg);
                }
            });
        }

        function removeItem(cartItemId) {
            if (confirm('确认移除该商品？')) {
                fetch('/cart/remove/' + cartItemId, { method: 'POST' })
                .then(function() { location.reload(); });
            }
        }
    </script>
</body>
</html>
