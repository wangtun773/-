<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('首页 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <!-- 搜索栏 -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <form th:action="@{/product/list}" method="get" class="d-flex search-box mx-auto">
                    <input type="text" name="keyword" class="form-control"
                           placeholder="搜索商品名称或描述..."
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-primary ms-2">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </form>
            </div>
        </div>

        <!-- 搜索结果提示 -->
        <div th:if="${keyword != null}" class="mb-3">
            <h5>
                搜索"<span th:text="${keyword}">关键词</span>"的结果，
                共 <span th:text="${totalItems}">0</span> 个商品
            </h5>
        </div>

        <!-- 商品列表 -->
        <div th:if="${products != null and !products.isEmpty()}">
            <div class="row">
                <div class="col-md-3 mb-4" th:each="product : ${products}">
                    <div class="card product-card shadow-sm">
                        <div class="card-img-top bg-light d-flex align-items-center justify-content-center"
                             style="height:200px;">
                            <i class="bi bi-box-seam" style="font-size: 4rem; color: #ccc;"></i>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h6 class="card-title" th:text="${product.name}">商品名称</h6>
                            <p class="card-text text-muted small flex-grow-1"
                               th:text="${#strings.abbreviate(product.description, 50)}">描述</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="price-text" th:text="'¥' + ${product.price}">¥0.00</span>
                                <span class="text-muted small" th:text="'库存:' + ${product.stock}">库存</span>
                            </div>
                            <a th:href="@{/product/detail/{id}(id=${product.id})}"
                               class="btn btn-outline-primary btn-sm mt-2 w-100">查看详情</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/product/list(page=${currentPage - 1}, keyword=${keyword})}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/product/list(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/product/list(page=${currentPage + 1}, keyword=${keyword})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div th:if="${products == null or products.isEmpty()}" class="text-center py-5">
            <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
            <h4 class="text-muted mt-3">未找到相关商品</h4>
            <a th:href="@{/product/list}" class="btn btn-outline-primary mt-2">返回首页</a>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
