<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '在线购物平台'">在线购物平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/product/list"><i class="bi bi-cart3"></i> 在线购物平台</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/product/list"><i class="bi bi-house"></i> 首页</a></li>
                <!-- 普通用户导航 -->
                <th:block th:if="${sessionUser != null and sessionUser.role != 'ADMIN'}">
                    <li class="nav-item">
                        <a class="nav-link" href="/cart/list">
                            <i class="bi bi-cart"></i> 购物车
                            <span id="cartBadge" class="badge bg-warning text-dark" th:text="${cartCount}">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/order/my"><i class="bi bi-list-ul"></i> 我的订单</a>
                    </li>
                </th:block>
                <!-- 管理员导航 -->
                <th:block th:if="${sessionUser != null and sessionUser.role == 'ADMIN'}">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/products"><i class="bi bi-gear"></i> 商品管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/orders"><i class="bi bi-gear"></i> 订单管理</a>
                    </li>
                </th:block>
            </ul>
            <ul class="navbar-nav">
                <th:block th:if="${sessionUser == null}">
                    <li class="nav-item"><a class="nav-link" href="/login">登录</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">注册</a></li>
                </th:block>
                <th:block th:if="${sessionUser != null}">
                    <li class="nav-item">
                        <a class="nav-link" href="/profile"><i class="bi bi-person-gear"></i> 个人信息</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> 退出登录</a>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer bg-light mt-5 py-3 border-top">
    <div class="container text-center text-muted">
        <small>&copy; 2026 在线购物平台 | <strong>软件质量与测试课 2025-2026-2 学期</strong></small>
    </div>
</footer>

<div th:fragment="alerts" th:if="${successMsg != null or errorMsg != null}" class="container mt-3">
    <div class="alert alert-success alert-dismissible fade show" th:if="${successMsg != null}">
        <i class="bi bi-check-circle"></i> <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${errorMsg != null}">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</html>
