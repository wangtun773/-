<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('订单详情 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/order/my">我的订单</a></li>
                <li class="breadcrumb-item active" th:text="${order.orderNo}">订单编号</li>
            </ol>
        </nav>

        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">订单信息</h5>
                <span class="badge status-badge"
                      th:classappend="'status-' + ${order.status}"
                      th:switch="${order.status}">
                    <span th:case="'PENDING_PAYMENT'">待付款</span>
                    <span th:case="'PAID'">已付款</span>
                    <span th:case="'SHIPPED'">已发货</span>
                    <span th:case="'COMPLETED'">已完成</span>
                    <span th:case="'CANCELLED'">已取消</span>
                </span>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>订单编号：</strong><span th:text="${order.orderNo}">ORD</span></p>
                        <p><strong>下单时间：</strong><span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span></p>
                        <p><strong>订单金额：</strong><span class="text-danger fw-bold" th:text="'¥' + ${order.totalAmount}">¥0.00</span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>收货人：</strong><span th:text="${order.receiverName}">姓名</span></p>
                        <p><strong>联系电话：</strong><span th:text="${order.phone}">电话</span></p>
                        <p><strong>收货地址：</strong><span th:text="${order.address}">地址</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header"><h5 class="mb-0">商品明细</h5></div>
            <div class="card-body">
                <table class="table">
                    <thead><tr><th>商品名称</th><th>单价</th><th>数量</th><th>小计</th></tr></thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.productName}">名称</td>
                            <td th:text="'¥' + ${item.productPrice}">¥0.00</td>
                            <td th:text="${item.quantity}">1</td>
                            <td class="text-danger" th:text="'¥' + ${item.subtotal}">¥0.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="mb-4" th:if="${sessionUser.role != 'ADMIN'}">
            <form th:if="${order.status == 'PENDING_PAYMENT'}" th:action="@{/order/pay/{no}(no=${order.orderNo})}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn btn-warning">模拟付款</button>
            </form>
            <form th:if="${order.status == 'PENDING_PAYMENT'}" th:action="@{/order/cancel/{no}(no=${order.orderNo})}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-danger ms-2"
                        onclick="return confirm('确认取消该订单？')">取消订单</button>
            </form>
            <form th:if="${order.status == 'SHIPPED'}" th:action="@{/order/confirm-receipt/{no}(no=${order.orderNo})}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn btn-success"
                        onclick="return confirm('确认已收到货物？')">确认收货</button>
            </form>

            <!-- 时间线 -->
            <div th:if="${order.payTime != null}" class="mt-3 text-muted small">付款时间：<span th:text="${#temporals.format(order.payTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span></div>
            <div th:if="${order.shipTime != null}" class="text-muted small">发货时间：<span th:text="${#temporals.format(order.shipTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span></div>
            <div th:if="${order.completeTime != null}" class="text-muted small">完成时间：<span th:text="${#temporals.format(order.completeTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span></div>
            <div th:if="${order.cancelTime != null}" class="text-muted small">取消时间：<span th:text="${#temporals.format(order.cancelTime, 'yyyy-MM-dd HH:mm:ss')}">时间</span></div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
