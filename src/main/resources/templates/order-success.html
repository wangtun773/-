<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('订单提交成功 - 在线购物平台')}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card shadow-sm">
                    <div class="card-body py-5">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                        <h3 class="mt-3" th:text="${successMsg} ?: '订单提交成功'">订单提交成功</h3>
                        <p class="text-muted" th:if="${orderNo != null}">
                            订单编号：<strong th:text="${orderNo}">ORD123456</strong>
                        </p>
                        <p class="text-muted">请前往"我的订单"查看详情</p>
                        <div class="mt-4">
                            <a th:href="@{/order/my}" class="btn btn-primary">查看我的订单</a>
                            <a th:href="@{/product/list}" class="btn btn-outline-secondary ms-2">继续购物</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
</body>
</html>
