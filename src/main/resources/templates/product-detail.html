<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(title=${product.name + ' - 在线购物平台'})}"></head>
<body>
    <div th:replace="layout :: nav"></div>
    <div th:replace="layout :: alerts"></div>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/product/list">首页</a></li>
                <li class="breadcrumb-item active" th:text="${product.name}">商品名称</li>
            </ol>
        </nav>

        <div class="card shadow-sm">
            <div class="row g-0">
                <div class="col-md-4 bg-light d-flex align-items-center justify-content-center" style="min-height:400px;">
                    <i class="bi bi-box-seam" style="font-size: 8rem; color: #ccc;"></i>
                </div>
                <div class="col-md-8">
                    <div class="card-body p-4">
                        <h3 th:text="${product.name}">商品名称</h3>
                        <hr>
                        <div class="mb-3">
                            <span class="price-text" style="font-size: 2rem;"
                                  th:text="'¥' + ${product.price}">¥0.00</span>
                        </div>
                        <div class="mb-3">
                            <span class="text-muted">库存数量：</span>
                            <span class="fw-bold" th:text="${product.stock}">0</span>
                            <span th:if="${product.stock == 0}" class="text-danger ms-2">暂时缺货</span>
                        </div>
                        <div class="mb-4" th:if="${sessionUser != null and sessionUser.role != 'ADMIN'}">
                            <label class="form-label fw-bold">购买数量：</label>
                            <div class="input-group" style="max-width:200px;">
                                <button type="button" class="btn btn-outline-secondary" onclick="changeQty(-1)">-</button>
                                <input type="number" id="quantity" class="form-control text-center"
                                       value="1" min="1" th:max="${product.stock}" max="99">
                                <button type="button" class="btn btn-outline-secondary" onclick="changeQty(1)">+</button>
                            </div>
                            <div class="form-text">单次最多购买99件</div>
                        </div>
                        <div th:if="${sessionUser != null and sessionUser.role != 'ADMIN'}">
                            <button id="addToCartBtn" class="btn btn-danger btn-lg"
                                    th:attr="data-product-id=${product.id}"
                                    th:disabled="${product.stock == 0}">
                                <i class="bi bi-cart-plus"></i> 加入购物车
                            </button>
                        </div>
                        <div th:if="${sessionUser == null}" class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 请先<a th:href="@{/login}">登录</a>后再购买
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header">
                <h5 class="mb-0">商品描述</h5>
            </div>
            <div class="card-body">
                <p class="mb-0" th:text="${product.description}">商品描述</p>
            </div>
        </div>
    </div>

    <div th:replace="layout :: footer"></div>
    <div th:replace="layout :: scripts"></div>
    <script>
        function changeQty(delta) {
            var input = document.getElementById('quantity');
            var newVal = parseInt(input.value) + delta;
            var maxStock = parseInt(input.getAttribute('max'));
            var stock = [[${product.stock}]];
            var max = Math.min(99, stock);
            if (newVal >= 1 && newVal <= max) {
                input.value = newVal;
            }
        }

        document.getElementById('addToCartBtn').addEventListener('click', function() {
            var productId = this.getAttribute('data-product-id');
            var quantity = document.getElementById('quantity').value;
            fetch('/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'productId=' + productId + '&quantity=' + quantity
            })
            .then(function(r) { return r.text(); })
            .then(function(msg) {
                if (msg === 'SUCCESS') {
                    alert('已成功加入购物车');
                    updateCartCount();
                } else {
                    alert(msg);
                }
            });
        });

        function updateCartCount() {
            fetch('/cart/count')
            .then(function(r) { return r.text(); })
            .then(function(count) {
                var badge = document.getElementById('cartBadge');
                if (badge) badge.textContent = count;
            });
        }
    </script>
</body>
</html>
